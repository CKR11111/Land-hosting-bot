<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CKRPRO | Compact Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.4.12/ace.js"></script>

    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #1a1a1a;
            --border: #ececec;
            --accent: #007aff;
            --red: #ff3b30;
            --green: #28c76f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 40px; }

        /* Compact Header */
        .header {
            background: #fff;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .header h2 { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }

        .container { width: 94%; max-width: 400px; margin: 15px auto; }

        /* Upload Section */
        .upload-card {
            background: var(--card);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
            text-align: center;
        }
        .upload-btn {
            display: block; width: 100%; border: 1px dashed #ccc; padding: 10px;
            border-radius: 8px; font-size: 12px; color: #666; cursor: pointer;
        }

        /* App Project Card */
        .app-card {
            background: var(--card);
            border-radius: 14px;
            padding: 15px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f9f9f9;
        }
        .app-name { font-size: 14px; font-weight: 700; color: #333; }
        .status-text { font-size: 10px; font-weight: 800; color: #aaa; text-transform: uppercase; }

        /* Vertical Action List */
        .action-stack { display: flex; flex-direction: column; gap: 8px; }
        
        .btn {
            width: 100%; padding: 11px; border-radius: 10px; font-size: 12px; font-weight: 600;
            border: none; cursor: pointer; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.97); opacity: 0.8; }
        
        .btn-run { background: #e8f9ef; color: var(--green); }
        .btn-stop { background: #fff1f0; color: var(--red); }
        .btn-edit { background: #eef6ff; color: var(--accent); }
        .btn-utility { background: #f1f1f2; color: #555; }

        /* Compact Console */
        .console {
            background: #1a1a1a; border-radius: 10px; margin-top: 12px; overflow: hidden;
        }
        .console-box {
            height: 120px; padding: 12px; font-family: 'SF Mono', monospace;
            font-size: 10px; color: #00ff00; overflow-y: auto; white-space: pre-wrap; line-height: 1.4;
        }
        .console-input {
            background: #000; display: flex; padding: 8px 12px; border-top: 1px solid #333;
        }
        .console-input input {
            background: transparent; border: none; color: #fff; flex: 1; outline: none; font-size: 11px;
        }

        /* Editor Modal Overlay */
        #editorModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 1000; flex-direction: column;
        }
        .modal-nav {
            padding: 12px 18px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border);
        }
        #fileList { height: 150px; overflow-y: auto; background: #fafafa; border-bottom: 1px solid #eee; }
        .f-row {
            padding: 12px 18px; border-bottom: 1px solid #f0f0f0;
            display: flex; justify-content: space-between; font-size: 12px;
        }
        #ace-editor { flex: 1; width: 100%; }
        .save-bar { padding: 15px; background: #fff; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="header">
        <h2>CKRPRO <span style="color:var(--accent)">V6</span></h2>
        <div style="display:flex; gap:12px; align-items:center;">
            <span style="font-size:11px; font-weight:600; color:#999;">@{{ username }}</span>
            <a href="/logout" style="color:var(--red); font-size:16px;"><i class="fa-solid fa-power-off"></i></a>
        </div>
    </div>

    <div class="container">
        <div class="upload-card">
            <form action="/upload" method="post" enctype="multipart/form-data" id="upF">
                <input type="file" name="file" id="zip" hidden onchange="document.getElementById('upF').submit()">
                <label for="zip" class="upload-btn">
                    <i class="fa-solid fa-cloud-arrow-up"></i> Upload Project (.zip)
                </label>
            </form>
        </div>

        {% for app in apps %}
        <div class="app-card">
            <div class="app-header">
                <span class="app-name">{{ app.name }}</span>
                <span id="st-{{ app.name }}" class="status-text">OFFLINE</span>
            </div>

            <div class="action-stack">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <a href="/run/{{ app.name }}" class="btn btn-run"><i class="fa-solid fa-play"></i> START</a>
                    <a href="/stop/{{ app.name }}" class="btn btn-stop"><i class="fa-solid fa-stop"></i> STOP</a>
                </div>

                <button onclick="openEd('{{ app.name }}')" class="btn btn-edit">
                    <i class="fa-solid fa-code"></i> EDIT SOURCE CODE
                </button>

                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px;">
                    <a href="/download/{{ app.name }}" class="btn btn-utility" title="Download ZIP"><i class="fa-solid fa-download"></i></a>
                    <a href="/restart/{{ app.name }}" class="btn btn-utility" title="Restart Bot"><i class="fa-solid fa-rotate"></i></a>
                    <button onclick="confirmDel('{{ app.name }}')" class="btn btn-utility" style="color:var(--red)" title="Delete Project"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>

            <div class="console">
                <div id="log-{{ app.name }}" class="console-box">Initializing terminal...</div>
                <div class="console-input">
                    <input type="text" placeholder="Type command..." onkeydown="if(event.key==='Enter') sendCmd('{{ app.name }}', this)">
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <div id="editorModal">
        <div class="modal-nav">
            <span style="font-weight:700; font-size:14px;">Project Files</span>
            <button onclick="document.getElementById('editorModal').style.display='none'" style="border:none; background:none; color:var(--red); font-weight:700;">CLOSE</button>
        </div>
        <div id="fileList"></div>
        <div id="ace-editor"></div>
        <div class="save-bar">
            <button onclick="saveF()" style="width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:12px; font-weight:800; font-size:13px;">SAVE & DEPLOY</button>
        </div>
    </div>

    <script>
        let editor = ace.edit("ace-editor");
        editor.setTheme("ace/theme/chrome"); // Clean white theme for editor
        let curApp = "", curFile = "";

        // Send Command to Backend
        function sendCmd(name, input) {
            if(!input.value) return;
            fetch('/execute_command', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({name: name, command: input.value})
            }).then(res=>res.json()).then(data=>{
                let box = document.getElementById(`log-${name}`);
                box.innerText += `\n$ ${input.value}\n${data.output}`;
                box.scrollTop = box.scrollHeight;
                input.value = "";
            });
        }

        // File Manager Functions
        function openEd(name) {
            curApp = name;
            document.getElementById('editorModal').style.display = 'flex';
            fetchFiles();
        }

        function fetchFiles() {
            fetch('/list_files/'+curApp).then(res=>res.json()).then(data=>{
                let h = "";
                data.files.forEach(f => {
                    h += `<div class="f-row">
                        <span onclick="loadF('${f}')" style="color:var(--accent); cursor:pointer; font-weight:600;">📄 ${f}</span>
                        <i class="fa-solid fa-trash" style="color:#ddd; cursor:pointer;" onclick="delFile('${f}')"></i>
                    </div>`;
                });
                document.getElementById('fileList').innerHTML = h;
            });
        }

        function loadF(f) {
            curFile = f;
            fetch('/read_file', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({project: curApp, filename: f})
            }).then(res=>res.json()).then(data=>{
                editor.setValue(data.content, -1);
                Swal.fire({ toast:true, position:'top', icon:'info', title:'Loaded '+f, showConfirmButton:false, timer:800 });
            });
        }

        function saveF() {
            if(!curFile) return Swal.fire('Error','Select a file first','error');
            fetch('/save_file', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({project: curApp, filename: curFile, content: editor.getValue()})
            }).then(()=>Swal.fire('Saved','File updated successfully','success'));
        }

        function delFile(f) {
            fetch('/delete_file', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({project: curApp, filename: f})
            }).then(()=>fetchFiles());
        }

        function confirmDel(name) {
            Swal.fire({ title:'Delete Project?', text:name, icon:'warning', showCancelButton:true, confirmButtonColor:'#ff3b30' })
            .then((r)=> { if(r.isConfirmed) window.location.href='/delete/'+name; });
        }

        // Live Log Updates
        setInterval(() => {
            {% for app in apps %}
            fetch('/get_log/{{ app.name }}').then(res=>res.json()).then(data=>{
                document.getElementById('log-{{ app.name }}').innerText = data.log || "No logs available";
                const st = document.getElementById('st-{{ app.name }}');
                st.innerText = data.status;
                st.style.color = data.status === "RUNNING" ? "var(--green)" : "#999";
            });
            {% endfor %}
        }, 3000);
    </script>
</body>
</html>
